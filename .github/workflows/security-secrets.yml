name: Security - Secrets

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3
      - uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
